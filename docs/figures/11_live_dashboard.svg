<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#475569"/>
    </marker>
    <marker id="arrB" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="60" y="70" font-size="36" font-weight="700" fill="#0f172a">Live Pipeline Dashboard — FastAPI + SSE</text>
  <text x="60" y="104" font-size="19" fill="#64748b">Watch every stage of the review as it actually runs — real push updates, no page refreshes</text>

  <!-- Browser -->
  <rect x="60" y="170" width="360" height="330" rx="14" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
  <rect x="60" y="170" width="360" height="44" rx="14" fill="#e2e8f0"/>
  <circle cx="90" cy="192" r="6" fill="#dc2626"/><circle cx="112" cy="192" r="6" fill="#d97706"/><circle cx="134" cy="192" r="6" fill="#059669"/>
  <text x="240" y="198" font-size="15" font-weight="600" fill="#334155" text-anchor="middle">Browser (plain HTML/JS)</text>
  <text x="240" y="248" font-size="15" fill="#334155" text-anchor="middle">Upload a PDF</text>
  <rect x="100" y="268" width="280" height="34" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="240" y="290" font-size="14" fill="#065f46" text-anchor="middle">✓ Parsing — title, 8 sections</text>
  <rect x="100" y="312" width="280" height="34" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="240" y="334" font-size="14" fill="#065f46" text-anchor="middle">✓ RAG index — 42 chunks</text>
  <rect x="100" y="356" width="280" height="34" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="240" y="378" font-size="14" fill="#1e3a8a" text-anchor="middle">⏳ Novelty agent — running…</text>
  <rect x="100" y="400" width="280" height="34" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="240" y="422" font-size="14" fill="#92400e" text-anchor="middle">⏸ Waiting for human approval</text>
  <text x="240" y="470" font-size="13" fill="#64748b" text-anchor="middle">EventSource — no framework, no bundler</text>

  <!-- Arrows -->
  <line x1="420" y1="250" x2="560" y2="250" stroke="#475569" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="490" y="238" font-size="14" fill="#475569" text-anchor="middle">POST /api/upload</text>
  <line x1="560" y1="330" x2="420" y2="330" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrB)"/>
  <text x="490" y="318" font-size="14" font-weight="600" fill="#2563eb" text-anchor="middle">SSE stream</text>
  <text x="490" y="352" font-size="13" fill="#64748b" text-anchor="middle">one event per real stage</text>
  <line x1="420" y1="420" x2="560" y2="420" stroke="#475569" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="490" y="408" font-size="14" fill="#475569" text-anchor="middle">POST /api/approval</text>

  <!-- Server -->
  <rect x="570" y="170" width="340" height="330" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="740" y="208" font-size="19" font-weight="600" fill="#1e3a8a" text-anchor="middle">FastAPI Server</text>
  <text x="740" y="234" font-size="14" fill="#64748b" text-anchor="middle">one port, no separate frontend build</text>
  <text x="740" y="272" font-size="15" fill="#334155" text-anchor="middle">/api/upload · /api/stream (SSE)</text>
  <text x="740" y="298" font-size="15" fill="#334155" text-anchor="middle">/api/approval · /api/query (live RAG)</text>
  <text x="740" y="324" font-size="15" fill="#334155" text-anchor="middle">/api/health · /api/history</text>
  <rect x="610" y="356" width="260" height="110" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="740" y="388" font-size="15" font-weight="600" fill="#1e3a8a" text-anchor="middle">run_pipeline() generator</text>
  <text x="740" y="414" font-size="14" fill="#334155" text-anchor="middle">yields an event as each stage</text>
  <text x="740" y="436" font-size="14" fill="#334155" text-anchor="middle">really finishes; pauses at the</text>
  <text x="740" y="458" font-size="14" fill="#334155" text-anchor="middle">human-approval interrupt</text>

  <!-- Backend deps -->
  <line x1="910" y1="335" x2="1000" y2="335" stroke="#475569" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="1010" y="170" width="210" height="330" rx="14" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="1115" y="208" font-size="17" font-weight="600" fill="#4c1d95" text-anchor="middle">Local stack</text>
  <text x="1115" y="252" font-size="15" fill="#334155" text-anchor="middle">Ollama (LLM + VLM)</text>
  <text x="1115" y="290" font-size="15" fill="#334155" text-anchor="middle">FAISS indexes</text>
  <text x="1115" y="328" font-size="15" fill="#334155" text-anchor="middle">LangGraph review</text>
  <text x="1115" y="366" font-size="15" fill="#334155" text-anchor="middle">MySQL persistence</text>
  <text x="1115" y="404" font-size="15" fill="#334155" text-anchor="middle">Health probes are</text>
  <text x="1115" y="428" font-size="15" fill="#334155" text-anchor="middle">real checks, not</text>
  <text x="1115" y="452" font-size="15" fill="#334155" text-anchor="middle">hardcoded "Healthy"</text>

  <!-- Why not streamlit -->
  <rect x="60" y="560" width="1160" height="100" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="640" y="596" font-size="17" font-weight="600" fill="#92400e" text-anchor="middle">Why not Streamlit (the suggested tool)?</text>
  <text x="640" y="624" font-size="15" fill="#334155" text-anchor="middle">Streamlit re-runs the whole script on every interaction — it can't push live stage updates while a 20-minute pipeline runs.</text>
  <text x="640" y="648" font-size="15" fill="#334155" text-anchor="middle">Server-Sent Events give genuine real-time push; unbuilt stages are shown honestly as "not implemented", never faked.</text>
</svg>

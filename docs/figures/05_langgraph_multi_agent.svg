<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#475569"/>
    </marker>
    <marker id="arrP" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#d97706"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="60" y="60" font-size="34" font-weight="700" fill="#0f172a">Multi-Agent Orchestration (LangGraph)</text>
  <text x="60" y="92" font-size="18" fill="#64748b">10 agents wired into one graph — parallel where possible, strict joins where order matters</text>

  <!-- START -->
  <rect x="580" y="115" width="120" height="40" rx="20" fill="#0f172a"/>
  <text x="640" y="141" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">START</text>

  <!-- fan-out arrows -->
  <line x1="600" y1="155" x2="165" y2="195" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="620" y1="155" x2="410" y2="195" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="640" y1="155" x2="640" y2="195" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="660" y1="155" x2="880" y2="195" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="680" y1="155" x2="1120" y2="195" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Row: 5 parallel nodes -->
  <rect x="55" y="200" width="220" height="64" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="165" y="227" font-size="15" font-weight="600" fill="#1e3a8a" text-anchor="middle">Paper Understanding</text>
  <text x="165" y="249" font-size="13" fill="#64748b" text-anchor="middle">summary · contributions</text>

  <rect x="300" y="200" width="220" height="64" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="410" y="227" font-size="15" font-weight="600" fill="#1e3a8a" text-anchor="middle">Literature RAG</text>
  <text x="410" y="249" font-size="13" fill="#64748b" text-anchor="middle">retrieval only, no LLM</text>

  <rect x="530" y="200" width="220" height="64" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="640" y="227" font-size="15" font-weight="600" fill="#1e3a8a" text-anchor="middle">Figure / Table</text>
  <text x="640" y="249" font-size="13" fill="#64748b" text-anchor="middle">captions + VLM output</text>

  <rect x="770" y="200" width="220" height="64" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="880" y="227" font-size="15" font-weight="600" fill="#4c1d95" text-anchor="middle">Methodology</text>
  <text x="880" y="249" font-size="13" fill="#64748b" text-anchor="middle">experiments · baselines</text>

  <rect x="1010" y="200" width="220" height="64" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="1120" y="227" font-size="15" font-weight="600" fill="#4c1d95" text-anchor="middle">Evidence &amp; Repro</text>
  <text x="1120" y="249" font-size="13" fill="#64748b" text-anchor="middle">unsupported claims</text>

  <!-- Novelty & Citation -->
  <line x1="165" y1="264" x2="255" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="380" y1="264" x2="300" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="180" y="326" width="220" height="64" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="290" y="353" font-size="15" font-weight="600" fill="#4c1d95" text-anchor="middle">Novelty</text>
  <text x="290" y="375" font-size="13" fill="#64748b" text-anchor="middle">grounded in retrieved literature</text>

  <line x1="440" y1="264" x2="530" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="400" y1="358" x2="450" y2="358" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="460" y="326" width="220" height="64" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="570" y="353" font-size="15" font-weight="600" fill="#4c1d95" text-anchor="middle">Citation</text>
  <text x="570" y="375" font-size="13" fill="#64748b" text-anchor="middle">coverage &amp; similarity</text>

  <!-- Adversarial critic -->
  <line x1="680" y1="358" x2="800" y2="358" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="880" y1="264" x2="895" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="1120" y1="264" x2="1000" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="810" y="326" width="220" height="64" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="920" y="353" font-size="15" font-weight="600" fill="#991b1b" text-anchor="middle">Adversarial Critic</text>
  <text x="920" y="375" font-size="13" fill="#64748b" text-anchor="middle">attacks method/citation/evidence</text>

  <!-- Reflection AND-join -->
  <line x1="290" y1="390" x2="530" y2="452" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="920" y1="390" x2="700" y2="452" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="465" y="458" width="290" height="66" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="610" y="486" font-size="16" font-weight="600" fill="#92400e" text-anchor="middle">Reflection (verifier)</text>
  <text x="610" y="508" font-size="13" fill="#64748b" text-anchor="middle">true AND-join: waits for all assessments</text>

  <!-- revision loop -->
  <path d="M 465 491 L 120 491 L 120 430" fill="none" stroke="#d97706" stroke-width="2" stroke-dasharray="7 5"/>
  <rect x="35" y="430" width="170" height="56" rx="10" fill="#fff7ed" stroke="#d97706" stroke-width="2"/>
  <text x="120" y="453" font-size="14" font-weight="600" fill="#92400e" text-anchor="middle">prepare_revision</text>
  <text x="120" y="473" font-size="12" fill="#64748b" text-anchor="middle">targeted feedback text</text>
  <path d="M 120 430 L 120 300 L 165 300 L 165 268" fill="none" stroke="#d97706" stroke-width="0"/>
  <path d="M 105 430 L 105 395 L 180 370" fill="none" stroke="#d97706" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrP)"/>
  <text x="255" y="452" font-size="13" fill="#92400e">revise? re-run the 4 assessment</text>
  <text x="255" y="470" font-size="13" fill="#92400e">agents once, with feedback</text>

  <!-- final review -->
  <line x1="610" y1="524" x2="610" y2="566" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 700 264 L 700 300 L 740 300 L 740 599 L 720 599" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  <rect x="465" y="572" width="255" height="60" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="592" y="597" font-size="16" font-weight="600" fill="#065f46" text-anchor="middle">Final Review</text>
  <text x="592" y="619" font-size="13" fill="#64748b" text-anchor="middle">synthesis of every agent's output</text>

  <line x1="720" y1="602" x2="835" y2="602" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="845" y="572" width="230" height="60" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="960" y="597" font-size="16" font-weight="600" fill="#92400e" text-anchor="middle">Human Approval</text>
  <text x="960" y="619" font-size="13" fill="#64748b" text-anchor="middle">interrupt() — pauses until decided</text>

  <line x1="1075" y1="602" x2="1140" y2="602" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="1150" y="582" width="80" height="40" rx="20" fill="#0f172a"/>
  <text x="1190" y="608" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">END</text>

  <text x="60" y="690" font-size="14" fill="#64748b">Gotcha we fixed: separate edges into a node are OR-triggers in LangGraph — a real join needs one add_edge([a, b, …], target) call</text>
</svg>

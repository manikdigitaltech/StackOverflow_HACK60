<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="60" y="70" font-size="36" font-weight="700" fill="#0f172a">Rebuttal-Aware Re-Review</text>
  <text x="60" y="104" font-size="19" fill="#64748b">The authors write back — and the AI reviewer genuinely reconsiders (problem statement "brownie point")</text>

  <!-- Step 1 -->
  <rect x="60" y="170" width="330" height="100" rx="12" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="225" y="205" font-size="18" font-weight="600" fill="#065f46" text-anchor="middle">1 · First review completed</text>
  <text x="225" y="233" font-size="15" fill="#334155" text-anchor="middle">full pipeline + human approval</text>
  <text x="225" y="256" font-size="15" font-weight="600" fill="#dc2626" text-anchor="middle">verdict: "weak reject"</text>

  <line x1="390" y1="220" x2="460" y2="220" stroke="#475569" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="470" y="170" width="330" height="100" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="635" y="205" font-size="18" font-weight="600" fill="#92400e" text-anchor="middle">2 · Author rebuttal arrives</text>
  <text x="635" y="233" font-size="15" fill="#334155" text-anchor="middle">"You said the baseline is missing —</text>
  <text x="635" y="256" font-size="15" fill="#334155" text-anchor="middle">we added it, see Table 4"</text>

  <line x1="800" y1="220" x2="870" y2="220" stroke="#475569" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="880" y="170" width="340" height="100" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="1050" y="205" font-size="18" font-weight="600" fill="#991b1b" text-anchor="middle">3 · Rebuttal is sanitized</text>
  <text x="1050" y="233" font-size="15" fill="#334155" text-anchor="middle">guardrails clean it &amp; wrap it in</text>
  <text x="1050" y="256" font-size="15" fill="#334155" text-anchor="middle">labeled &lt;author_rebuttal&gt; tags</text>

  <path d="M 1050 270 L 1050 330 L 640 330 L 640 360" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="390" y="370" width="500" height="110" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="640" y="406" font-size="18" font-weight="600" fill="#4c1d95" text-anchor="middle">4 · FULL re-review — not a shortcut</text>
  <text x="640" y="434" font-size="15" fill="#334155" text-anchor="middle">the entire pipeline runs again; every assessment agent</text>
  <text x="640" y="457" font-size="15" fill="#334155" text-anchor="middle">reads the rebuttal alongside the paper and reconsiders</text>

  <line x1="640" y1="480" x2="640" y2="520" stroke="#475569" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect x="390" y="530" width="500" height="90" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="640" y="565" font-size="18" font-weight="600" fill="#92400e" text-anchor="middle">5 · Human approves the revised verdict</text>
  <text x="640" y="593" font-size="15" fill="#334155" text-anchor="middle">the re-review still passes every quality check &amp; approval gate</text>

  <line x1="890" y1="575" x2="960" y2="575" stroke="#475569" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Result -->
  <rect x="970" y="530" width="250" height="90" rx="12" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="1095" y="563" font-size="16" font-weight="600" fill="#065f46" text-anchor="middle">Verdict change reported</text>
  <text x="1095" y="590" font-size="15" fill="#334155" text-anchor="middle">weak_reject → weak_accept</text>

  <text x="60" y="680" font-size="15" fill="#64748b">A good rebuttal can raise the score; a weak one leaves it unchanged — just like a real conference review cycle.</text>
</svg>
